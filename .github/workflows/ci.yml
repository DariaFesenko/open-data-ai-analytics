name: CI pipeline

on:
  push:
    branches: ["main", "ci-setup"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality, data_research, visualization]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run module(s)
        run: |
          mkdir -p artifacts
          if [ "${{ github.event.inputs.module }}" = "all" ]; then
            for mod in data_load data_quality data_research visualization; do
              mkdir -p artifacts/$mod
              python src/$mod.py > artifacts/$mod/log.txt 2>&1 || true
            done
          else
            mkdir -p artifacts/${{ github.event.inputs.module }}
            python src/${{ github.event.inputs.module }}.py > artifacts/${{ github.event.inputs.module }}/log.txt 2>&1 || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.module }}-${{ matrix.module }}-results
          path: artifacts/${{ matrix.module }}